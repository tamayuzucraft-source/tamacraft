<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市販素材カット設定DB</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F0;--cream-dark:#EDE8DC;--teal:#5BBCB0;--teal-light:#B2E0DB;--teal-dark:#3D9E92;--green:#7BBF6A;--text:#3A4A3F;--text-light:#6B7C72;--white:#FFFFFF}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dark) 100%);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 12px rgba(61,158,146,0.3);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.logo{font-size:24px}
header h1{color:white;font-size:16px;font-weight:700;line-height:1.3}
header p{color:rgba(255,255,255,0.85);font-size:11px;margin-top:1px}
.header-btns{display:flex;gap:8px}
.hbtn{border-radius:20px;padding:7px 14px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;border:1.5px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.15);color:white}
.hbtn:hover{background:rgba(255,255,255,0.3)}
.hbtn-add{background:rgba(255,255,255,0.9);color:var(--teal-dark);border-color:transparent}
.hbtn-add:hover{background:white}

.stats-bar{background:var(--teal-light);padding:8px 20px;display:flex;gap:12px;font-size:12px;color:var(--teal-dark);font-weight:500;flex-wrap:wrap}

.machine-toggle{display:flex;gap:0;background:var(--cream-dark);border-radius:12px;padding:4px;margin:14px 20px 0}
.machine-btn{flex:1;padding:8px 4px;border:none;border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--text-light)}
.machine-btn.active{background:var(--teal);color:white;box-shadow:0 2px 8px rgba(91,188,176,0.4)}

.controls{padding:12px 20px 14px;display:flex;flex-direction:column;gap:10px}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;border:2px solid var(--teal-light);border-radius:24px;font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--white);color:var(--text);outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--teal)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:16px;border:2px solid var(--teal-light);background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--text-light);cursor:pointer;transition:all 0.2s;font-weight:500;white-space:nowrap}
.chip:hover,.chip.active{background:var(--teal);border-color:var(--teal);color:white}
.blade-chip{padding:5px 12px;border-radius:16px;border:2px solid #D4A8E0;background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:11px;color:#7A5A8A;cursor:pointer;transition:all 0.2s;font-weight:500;white-space:nowrap}
.blade-chip:hover,.blade-chip.active{background:#9B6BB5;border-color:#9B6BB5;color:white}
.sort-label{font-size:11px;color:var(--text-light);font-weight:600;white-space:nowrap}
.sort-btn{padding:5px 12px;border-radius:16px;border:2px solid var(--teal-light);background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--text-light);cursor:pointer;transition:all 0.2s;font-weight:500;white-space:nowrap}
.sort-btn:hover{border-color:var(--teal);color:var(--teal)}
.sort-btn.active{background:var(--teal-dark);border-color:var(--teal-dark);color:white}
.sort-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.divider{height:1px;background:var(--cream-dark);margin:2px 0}
.result-count{padding:0 20px 8px;font-size:12px;color:var(--text-light)}

.cards{padding:0 16px 100px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--white);border-radius:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(91,188,176,0.1);border-left:4px solid var(--teal-light);transition:box-shadow 0.2s,transform 0.15s}
.card:hover{box-shadow:0 4px 16px rgba(91,188,176,0.2);transform:translateY(-1px)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-names{flex:1}
.card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.4}
.card-official{font-size:11px;color:var(--text-light);margin-top:2px}
.card-cat{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.card-specs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.spec{display:flex;flex-direction:column;background:var(--cream);border-radius:8px;padding:6px 10px;min-width:60px}
.spec-label{font-size:9px;color:var(--text-light);font-weight:500;margin-bottom:2px}
.spec-value{font-size:13px;font-weight:700;color:var(--teal-dark)}
.level-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-top:4px}
.level-少ない{background:#A8D8B0;color:#2E6B45}
.level-デフォルト{background:var(--teal);color:white}
.level-詳細{background:#E07878;color:white}
.card-memo{margin-top:6px;font-size:11px;color:var(--text-light);background:var(--cream);border-radius:8px;padding:6px 10px;line-height:1.5}
.memo-label{font-size:9px;font-weight:600;color:var(--text-light);margin-bottom:2px}
.card-actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.btn-edit{background:#E8F5F3;color:var(--teal-dark);border:1.5px solid var(--teal-light);border-radius:12px;padding:4px 14px;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-edit:hover{background:var(--teal-light)}
.btn-del{background:#FFF0EE;color:#C05050;border:1.5px solid #FFD0C8;border-radius:12px;padding:4px 14px;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-del:hover{background:#FFD0C8}
.empty{text-align:center;padding:60px 20px;color:var(--text-light);font-size:14px}
.empty .emoji{font-size:40px;margin-bottom:12px}
.fab{position:fixed;bottom:24px;right:20px;width:48px;height:48px;background:var(--teal);color:white;border:none;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(61,158,146,0.4);display:flex;align-items:center;justify-content:center;transition:transform 0.2s;z-index:50}
.fab:hover{transform:scale(1.1)}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(58,74,63,0.45);backdrop-filter:blur(3px);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--cream);border-radius:20px 20px 0 0;padding:22px 20px 40px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;animation:slideUp 0.25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:16px;font-weight:700;color:var(--teal-dark);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text-light);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:2px solid var(--teal-light);border-radius:12px;padding:10px 14px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);background:var(--white);outline:none;transition:border-color 0.2s;-webkit-appearance:none;appearance:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal)}
.form-group textarea{resize:vertical;min-height:65px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.autofill-note{font-size:10px;color:var(--teal-dark);margin-top:4px;font-weight:500}
.pressure-row{display:flex;gap:10px;align-items:flex-start}
.pressure-row .form-group{flex:1}
.pressure-auto{flex:1;background:var(--cream-dark);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--text-light);min-height:44px;display:flex;align-items:center}
.pressure-auto.filled{color:var(--teal-dark);font-weight:700}
.level-select{display:flex;gap:6px}
.level-btn{flex:1;padding:9px 4px;border-radius:10px;border:2px solid var(--teal-light);background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:var(--text-light);transition:all 0.2s;text-align:center}
.level-btn.sel-少ない{background:#A8D8B0;border-color:#A8D8B0;color:#2E6B45}
.level-btn.sel-デフォルト{background:var(--teal);border-color:var(--teal);color:white}
.level-btn.sel-詳細{background:#E07878;border-color:#E07878;color:white}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-save{flex:1;background:var(--teal);color:white;border:none;border-radius:14px;padding:13px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.2s}
.btn-save:hover{background:var(--teal-dark)}
.btn-cancel-modal{background:var(--cream-dark);color:var(--text-light);border:none;border-radius:14px;padding:13px 18px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.section-label{font-size:10px;font-weight:700;color:var(--teal-dark);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--teal-light)}
.notif{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--teal-dark);color:white;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;pointer-events:none;z-index:300;white-space:nowrap}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.mat-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-top:4px}
.mat-lite{background:#b8e8f8;color:#0a5a8a}
.mat-standard{background:#c8eaaa;color:#2a5e10}
.mat-fabric{background:#ffc0d0;color:#900040}
.mat-strong{background:#ddc8f0;color:#4a1880}
.mat-other{background:#eee;color:#555}
/* 公式プルダウン カテゴリ文字色 */
select optgroup[label="アートボード"]{color:#3a7a45}
select optgroup[label="アイロン接着タイプ"]{color:#2a8a80}
select optgroup[label="カードストック"]{color:#3a7a45}
select optgroup[label="ビニール"]{color:#1a7a9a}
select optgroup[label="プラスチック"]{color:#7a3a9a}
select optgroup[label="ホイル・金属"]{color:#2a5a8a}
select optgroup[label="布"]{color:#9a3a2a}
select optgroup[label="紙"]{color:#4a7a1a}
select optgroup[label="フェルト"]{color:#9a5a2a}
select optgroup[label="フォーム"]{color:#9a1a8a}
select optgroup[label="革"]{color:#7a5a1a}
select optgroup[label="木材"]{color:#6a4a1a}
select optgroup[label="その他"]{color:#8a6a1a}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <h1>市販素材カット設定DB</h1>
      <p>by tama._.craft</p>
    </div>
  </div>
  <div class="header-btns">
    <button class="hbtn" onclick="exportCSV()">📥 CSV</button>
    <button class="hbtn hbtn-add" onclick="openModal()">＋ 追加</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="machine-toggle">
  <button class="machine-btn active" onclick="setMachine('Joy')">🟦 Joy</button>
  <button class="machine-btn" onclick="setMachine('Explorer3')">🟧 Explorer 3</button>
  <button class="machine-btn" onclick="setMachine('Maker3')">🟩 Maker 3</button>
  <button class="machine-btn" onclick="setMachine('all')">📋 全て</button>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="素材名・公式素材名・メモで検索…" oninput="render()">
  </div>
  <div class="filter-chips" id="chips"></div>
  <div class="divider"></div>
  <div class="sort-row">
    <span class="sort-label">🔪 ブレード：</span>
    <div id="blade-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>
  <div class="sort-row">
    <span class="sort-label">📏 厚みソート：</span>
    <button class="sort-btn active" id="sort-none" onclick="setSort('none')">登録順</button>
    <button class="sort-btn" id="sort-thick-asc" onclick="setSort('thick-asc')">↑ 薄い順</button>
    <button class="sort-btn" id="sort-thick-desc" onclick="setSort('thick-desc')">↓ 厚い順</button>
  </div>
  <div class="sort-row" style="align-items:center;gap:8px">
    <span class="sort-label">📏 厚み範囲：</span>
    <input type="number" id="thick-min" placeholder="以上(mm)" step="0.1" min="0"
      style="width:90px;padding:5px 8px;border:1.5px solid var(--teal-light);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:12px;outline:none"
      oninput="render()">
    <span style="font-size:12px;color:var(--text-light)">〜</span>
    <input type="number" id="thick-max" placeholder="以下(mm)" step="0.1" min="0"
      style="width:90px;padding:5px 8px;border:1.5px solid var(--teal-light);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:12px;outline:none"
      oninput="render()">
    <button onclick="clearThick()" style="padding:5px 10px;border:1.5px solid var(--border,#ddd);border-radius:8px;background:#fff;font-size:11px;cursor:pointer;color:var(--text-light);font-family:'Noto Sans JP',sans-serif">クリア</button>
  </div>
</div>

<div class="result-count" id="result-count"></div>
<div class="cards" id="cards"></div>
<button class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeOut(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">✏️ カット設定を追加</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="section-label">📦 素材情報</div>
    <div class="form-row">
      <div class="form-group">
        <label>マシン *</label>
        <select id="f_machine" onchange="onMachineChange()">
          <option value="">選択してください</option>
          <option value="Joy">Joy</option>
          <option value="Explorer3">Explorer 3</option>
          <option value="Maker3">Maker 3</option>
        </select>
      </div>
      <div class="form-group">
        <label>カテゴリ *</label>
        <select id="f_category">
          <option value="">選択してください</option>
          <option>アートボード</option><option>アイロン接着タイプ</option>
          <option>カードストック</option><option>ビニール</option>
          <option>プラスチック</option><option>ホイル・金属</option>
          <option>布</option><option>紙</option><option>フェルト</option>
          <option>フォーム</option><option>革</option><option>木材</option>
          <option>その他</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>市販素材名 * （例：ダイソー グリッターシート、セリア フェルト）</label>
      <input type="text" id="f_name" placeholder="例：ダイソー ラメ入りビニールシール">
    </div>

    <div class="section-label">🔗 公式素材との紐付け</div>
    <div class="form-group">
      <label>公式類似素材（マシンを選ぶとリストが絞り込まれます）</label>
      <select id="f_official" onchange="onOfficialChange()">
        <option value="">— まずマシンを選択してください —</option>
      </select>
      <div class="autofill-note" id="autofill-note" style="display:none">✨ カット圧・ブレードを自動入力しました。必要に応じて下で修正できます。</div>
    </div>

    <div class="section-label">⚙️ カット設定</div>
    <div class="form-row">
      <div class="form-group">
        <label>公式圧力（自動入力）</label>
        <div class="pressure-auto" id="official_pressure">—</div>
      </div>
      <div class="form-group">
        <label>マイ圧力（手入力・上書き可）</label>
        <input type="number" id="f_pressure" placeholder="例：139">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>素材の厚み（mm）</label>
        <input type="number" id="f_thickness" placeholder="例：0.5" step="0.1" min="0">
      </div>
      <div class="form-group">
        <label>ブレード（公式素材選択で自動入力）</label>
        <select id="f_blade" disabled style="opacity:0.7;cursor:not-allowed">
          <option value="">公式素材を選択すると自動入力</option>
          <option>ファインポイントブレード</option>
          <option>ディープポイントブレード</option>
          <option>ボンデッドファブリックブレード</option>
          <option>ロータリーブレード</option>
          <option>スコアリングホイール</option>
          <option>ナイフブレード</option>
          <option>その他</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>使用マット（手動選択）</label>
        <select id="f_mat">
          <option value="">選択</option>
          <option value="LightGrip（水色）">LightGrip（水色）</option>
          <option value="StandardGrip（緑）">StandardGrip（緑）</option>
          <option value="FabricGrip（ピンク）">FabricGrip（ピンク）</option>
          <option value="StrongGrip（紫）">StrongGrip（紫）</option>
        </select>
      </div>
      <div class="form-group">
        <label>圧力レベル</label>
        <div class="level-select" id="levelBtns">
          <button class="level-btn" data-val="少ない" onclick="selectLevel('少ない')">少ない</button>
          <button class="level-btn" data-val="デフォルト" onclick="selectLevel('デフォルト')">デフォルト</button>
          <button class="level-btn" data-val="詳細" onclick="selectLevel('詳細')">詳細</button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>💬 メモ・コツ</label>
      <textarea id="f_memo" placeholder="例：ミラー設定必須、転写シート使用、2回カット推奨など"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEntry()">💾 保存する</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

function catTextColor(hex){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return (r*299+g*587+b*114)/1000>160?'#3A4A3F':'#FFFFFF'; }

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// === フォーム連動 ===
function onMachineChange(){
  const m = document.getElementById('f_machine').value;
  const sel = document.getElementById('f_official');
  sel.innerHTML = '<option value="">— 選択してください（任意）—</option>';
  document.getElementById('official_pressure').textContent = '—';
  document.getElementById('official_pressure').className = 'pressure-auto';
  document.getElementById('autofill-note').style.display = 'none';
  if(!m) return;
  const filtered = OFFICIAL_DATA.filter(d => d.machine === m);
  // カテゴリでグループ化
  const groups = {};
  filtered.forEach(d => {
    if(!groups[d.category]) groups[d.category] = [];
    groups[d.category].push(d);
  });
  Object.keys(groups).sort((a,b)=>a.localeCompare(b,'ja')).forEach(cat => {
    const og = document.createElement('optgroup');
    og.label = cat;
    groups[cat].forEach(d => {
      const op = document.createElement('option');
      op.value = d.name;
      op.dataset.pressure = d.pressure;
      op.dataset.blade = d.blade && d.blade !== '-' ? d.blade : '';
      op.dataset.multicut = d.multicut;
      op.textContent = trimOfficialName(d.name);
      og.appendChild(op);
    });
    sel.appendChild(og);
  });
}

// 公式素材名から / 以降を削除（ない場合はそのまま）
function trimOfficialName(name){
  if(!name) return '';
  const slashIdx = name.search(/\s*\//);
  if(slashIdx !== -1) return name.slice(0, slashIdx).trim();
  return name.trim();
}

// ブレード→マット自動判定
function autoMat(blade, category){
  if(!blade && !category) return '';
  if(category === '紙' || category === 'カードストック') return 'LightGrip（水色）';
  if(blade === 'ロータリーブレード') return 'FabricGrip（ピンク）';
  if(blade === 'ナイフブレード') return 'StrongGrip（紫）';
  return 'StandardGrip（緑）';
}

function onOfficialChange(){
  const sel = document.getElementById('f_official');
  const opt = sel.options[sel.selectedIndex];
  if(!opt || !opt.value){ 
    document.getElementById('official_pressure').textContent = '—';
    document.getElementById('official_pressure').className = 'pressure-auto';
    document.getElementById('autofill-note').style.display = 'none';
    return;
  }
  const p = opt.dataset.pressure;
  const b = opt.dataset.blade;
  // 公式圧力表示
  document.getElementById('official_pressure').textContent = p ? `${p}（カット回数: ${opt.dataset.multicut}）` : '—';
  document.getElementById('official_pressure').className = 'pressure-auto' + (p ? ' filled' : '');
  // マイ圧力欄に自動入力
  if(p) document.getElementById('f_pressure').value = p;
  // ブレード自動入力（disabled維持したまま値だけセット）
  const bladeEl = document.getElementById('f_blade');
  if(b){ bladeEl.value = b; } else { bladeEl.value = ''; }
  document.getElementById('autofill-note').style.display = p ? 'block' : 'none';
}

function selectLevel(v){
  selectedLevel = v;
  document.querySelectorAll('#levelBtns .level-btn').forEach(btn => {
    btn.className = 'level-btn' + (btn.dataset.val === v ? ' sel-'+v : '');
  });
}

// === 画面フィルター ===
function setMachine(m){
  currentMachine = m; currentCat = 'all'; currentBlade = 'all';
  document.querySelectorAll('.machine-btn').forEach((btn,i) => btn.classList.toggle('active', MACHINES[i] === m));
  buildChips(); buildBladeChips(); render();
}
function getCategories(){ const s = currentMachine==='all'?db:db.filter(d=>d.machine===currentMachine); const c=[...new Set(s.map(d=>d.category))].sort((a,b)=>a.localeCompare(b,'ja')); return ['all',...c]; }
function getBlades(){ const s = currentMachine==='all'?db:db.filter(d=>d.machine===currentMachine); const b=[...new Set(s.map(d=>d.blade).filter(v=>v))].sort((a,b)=>a.localeCompare(b,'ja')); return ['all',...b]; }
function buildChips(){ document.getElementById('chips').innerHTML = getCategories().map(c=>`<button class="chip${c===currentCat?' active':''}" onclick="setCat('${c}')">${c==='all'?'全カテゴリ':c}</button>`).join(''); }
function buildBladeChips(){ document.getElementById('blade-chips').innerHTML = getBlades().map(b=>`<button class="blade-chip${b===currentBlade?' active':''}" onclick="setBlade('${b}')">${b==='all'?'全て':b}</button>`).join(''); }
function setCat(c){ currentCat=c; buildChips(); render(); }
function setBlade(b){ currentBlade=b; buildBladeChips(); render(); }
function setSort(s){
  currentSort=s;
  ['sort-none','sort-thick-asc','sort-thick-desc'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.classList.remove('active');
  });
  const activeId = s==='none'?'sort-none':s==='thick-asc'?'sort-thick-asc':'sort-thick-desc';
  const el=document.getElementById(activeId); if(el) el.classList.add('active');
  render();
}
function clearThick(){
  document.getElementById('thick-min').value='';
  document.getElementById('thick-max').value='';
  render();
}

function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase();
  const thickMin = parseFloat(document.getElementById('thick-min')?.value);
  const thickMax = parseFloat(document.getElementById('thick-max')?.value);
  return db.filter(r=>{
    const mOk = currentMachine==='all'||r.machine===currentMachine;
    const cOk = currentCat==='all'||r.category===currentCat;
    const bOk = currentBlade==='all'||r.blade===currentBlade;
    const sOk = !q||r.name.toLowerCase().includes(q)||(r.official||'').toLowerCase().includes(q)||(r.memo||'').toLowerCase().includes(q);
    const t = parseFloat(r.thickness);
    const tMinOk = isNaN(thickMin) || (!isNaN(t) && t >= thickMin);
    const tMaxOk = isNaN(thickMax) || (!isNaN(t) && t <= thickMax);
    return mOk&&cOk&&bOk&&sOk&&tMinOk&&tMaxOk;
  }).sort((a,b)=>{
    if(currentSort==='thick-asc'){
      const ta=parseFloat(a.thickness), tb=parseFloat(b.thickness);
      if(isNaN(ta)&&isNaN(tb)) return 0;
      if(isNaN(ta)) return 1;
      if(isNaN(tb)) return -1;
      return ta-tb;
    }
    if(currentSort==='thick-desc'){
      const ta=parseFloat(a.thickness), tb=parseFloat(b.thickness);
      if(isNaN(ta)&&isNaN(tb)) return 0;
      if(isNaN(ta)) return 1;
      if(isNaN(tb)) return -1;
      return tb-ta;
    }
    return 0;
  });
}

  }

    const officialLine = officialDisplay?`<div class="card-official">📌 公式類似: <span style="color:${catColor(r.category)};filter:brightness(0.75);font-weight:700">${esc(officialDisplay)}</span></div>`:'';
    const levelBadge = r.level?`<span class="level-badge level-${r.level}">${r.level}</span>`:'';
    const matClass = r.mat?.includes('Lite')||r.mat?.includes('Light') ? 'mat-lite' : r.mat?.includes('Fabric') ? 'mat-fabric' : r.mat?.includes('Strong') ? 'mat-strong' : r.mat ? 'mat-standard' : '';
    const matBadge = r.mat ? `<span class="mat-badge ${matClass}">${esc(r.mat)}</span>` : '';
    const thickLine = r.thickness!=null&&r.thickness!==''&&r.thickness!==undefined ? `<div style="font-size:11px;color:var(--text-light);margin-top:3px">📏 厚み: ${r.thickness}mm</div>` : '';
    const memoLine = r.memo?`<div class="card-memo"><div class="memo-label">💬 メモ</div>${esc(r.memo)}</div>`:'';
    return `<div class="card" style="border-left-color:${catColor(r.category)}">
      <div class="card-header">
        <div class="card-names">
          <div class="card-name">${esc(r.name)}${mTag}</div>
          ${officialLine}
          ${thickLine}
        </div>
        <span class="card-cat" style="background:${catColor(r.category)};color:${catTextColor(catColor(r.category))}">${esc(r.category)}</span>
      </div>
      <div class="card-specs">
        ${r.officialPressure?`<div class="spec"><span class="spec-label">公式圧力</span><span class="spec-value" style="color:var(--text-light);font-size:12px">${r.officialPressure}</span></div>`:''}
        <div class="spec"><span class="spec-label">マイ圧力</span><span class="spec-value">${r.pressure||'—'}</span></div>
        ${r.blade?`<div class="spec"><span class="spec-label">ブレード</span><span class="spec-value" style="font-size:10px">${esc(r.blade)}</span></div>`:''}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
        ${levelBadge}
        ${matBadge}
      </div>
      ${memoLine}
      <div class="card-actions">
        <button class="btn-edit" onclick="openEdit('${r.id}')">✏️ 編集</button>
        <button class="btn-del" onclick="deleteEntry('${r.id}')">🗑 削除</button>
      </div>
    </div>`;
  }).join('');
}

// === モーダル ===
function openModal(id=null){
  editId = id;
  const r = id ? db.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = id?'✏️ カット設定を編集':'✏️ カット設定を追加';
  document.getElementById('f_machine').value = r?.machine||'';
  document.getElementById('f_category').value = r?.category||'';
  document.getElementById('f_name').value = r?.name||'';
  document.getElementById('f_pressure').value = r?.pressure||'';
  const bladeEl = document.getElementById('f_blade');
  bladeEl.value = r?.blade||'';
  document.getElementById('f_thickness').value = r?.thickness||'';
  document.getElementById('f_mat').value = r?.mat||'';
  document.getElementById('f_memo').value = r?.memo||'';
  selectedLevel = r?.level||'';
  document.querySelectorAll('#levelBtns .level-btn').forEach(btn=>{
    btn.className='level-btn'+(btn.dataset.val===selectedLevel?' sel-'+selectedLevel:'');
  });
  // マシン連動プルダウン構築
  onMachineChange();
  // 編集時は公式素材を選択状態に
  if(r?.official){
    const sel = document.getElementById('f_official');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value===r.official){ sel.selectedIndex=i; break; }
    }
    document.getElementById('official_pressure').textContent = r.officialPressure ? `${r.officialPressure}` : '—';
    document.getElementById('official_pressure').className = 'pressure-auto'+(r.officialPressure?' filled':'');
  }
  document.getElementById('overlay').classList.add('open');
}
function openEdit(id){ openModal(id); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editId=null; }
function closeOut(e){ if(e.target.id==='overlay') closeModal(); }

function saveEntry(){
  const machine=document.getElementById('f_machine').value;
  const category=document.getElementById('f_category').value;
  const name=document.getElementById('f_name').value.trim();
  if(!machine||!category||!name){ notify('⚠️ マシン・カテゴリ・素材名は必須です'); return; }
  const sel=document.getElementById('f_official');
  const opt=sel.options[sel.selectedIndex];
  const entry={
    id: editId||uid(), machine, category, name,
    official: opt?.value||'',
    officialPressure: opt?.dataset?.pressure||'',
    pressure: parseFloat(document.getElementById('f_pressure').value)||null,
    thickness: parseFloat(document.getElementById('f_thickness').value)||null,
    blade: document.getElementById('f_blade').value,
    mat: document.getElementById('f_mat').value,
    level: selectedLevel,
    memo: document.getElementById('f_memo').value.trim(),
  };
  if(editId){ db[db.findIndex(x=>x.id===editId)]=entry; notify('✅ 更新しました'); }
  else { db.unshift(entry); notify('✅ 登録しました'); }
  save(); closeModal(); buildChips(); buildBladeChips(); render();
}

function deleteEntry(id){
  if(!confirm('このデータを削除しますか？')) return;
  db=db.filter(x=>x.id!==id); save(); buildChips(); buildBladeChips(); render(); notify('🗑️ 削除しました');
}

function exportCSV(){
  const rows=getFiltered();
  const h=['素材名','マシン','カテゴリ','公式類似素材名','公式圧力','マイ圧力','素材の厚み','ブレード','使用マット','圧力レベル','メモ'];
  const csv=[h.join(','),...rows.map(r=>[r.name,r.machine,r.category,trimOfficialName(r.official||''),r.officialPressure||'',r.pressure||'',r.thickness||'',r.blade||'',r.mat||'',r.level||'',(r.memo||'').replace(/,/g,'；')].map(v=>`"${v}"`).join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='cricut_mydb.csv'; a.click(); notify('📥 CSV出力しました');
}

let nt;
function notify(msg){ const e=document.getElementById('notif'); e.textContent=msg; e.classList.add('show'); clearTimeout(nt); nt=setTimeout(()=>e.classList.remove('show'),2500); }

buildChips(); buildBladeChips(); render();
</script>
</body>
</html>
